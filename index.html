
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Monopoly Digital Twin - Mobile Stable v4</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js"></script>

<style>
body{
background:#111;
color:white;
font-family:monospace;
margin:0;
text-align:center;
}

#container{
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
}

video, canvas{
width:95vw;
max-width:480px;
border:2px solid #444;
border-radius:6px;
margin-bottom:10px;
}

button{
padding:12px 18px;
font-size:16px;
border-radius:6px;
border:none;
background:#2ecc71;
color:white;
margin:6px;
}

#logs{
width:95vw;
max-width:480px;
height:160px;
background:black;
color:#00ff9c;
overflow-y:auto;
font-size:12px;
padding:8px;
border:1px solid #333;
text-align:left;
}
</style>
</head>

<body>

<div id="container">

<h3>Monopoly Digital Twin</h3>

<button id="startBtn" disabled>Loading OpenCV...</button>
<button id="resetBtn">Reset Calibration</button>

<video id="video" autoplay playsinline muted></video>

<canvas id="canvasOutput"></canvas>
<canvas id="warpedCanvas" width="500" height="500"></canvas>

<div id="logs"></div>

</div>

<script>

let video=document.getElementById("video")
let canvasOutput=document.getElementById("canvasOutput")
let startBtn=document.getElementById("startBtn")
let resetBtn=document.getElementById("resetBtn")
let logs=document.getElementById("logs")

function log(msg){
console.log(msg)
logs.innerHTML+=msg+"<br>"
logs.scrollTop=logs.scrollHeight
}

let cap
let frame=null
let warped
let hsv,mask,contours,hierarchy
let homography=null
let calibrationPoints=[]
let initialized=false

function onOpenCvReady(){
log("OpenCV loaded")
startBtn.disabled=false
startBtn.innerText="Start Camera"
}

if(typeof cv!=="undefined" && cv.getBuildInformation){
onOpenCvReady()
}else{
cv["onRuntimeInitialized"]=onOpenCvReady
}

startBtn.onclick=startCamera

resetBtn.onclick=()=>{
localStorage.removeItem("boardHomography")
location.reload()
}

function startCamera(){

log("Starting camera")

navigator.mediaDevices.getUserMedia({
video:{facingMode:{ideal:"environment"}},
audio:false
}).then(stream=>{

video.srcObject=stream
video.play()

video.onloadedmetadata=()=>{

log("Camera metadata ready")

canvasOutput.width=video.videoWidth
canvasOutput.height=video.videoHeight

log("Video resolution "+video.videoWidth+" x "+video.videoHeight)

initVision()

}

}).catch(err=>log("Camera error "+err))

}

function initVision(){

cap=new cv.VideoCapture(video)

frame=new cv.Mat()   // <-- let OpenCV allocate automatically
warped=new cv.Mat(500,500,cv.CV_8UC4)

hsv=new cv.Mat()
mask=new cv.Mat()

contours=new cv.MatVector()
hierarchy=new cv.Mat()

let stored=localStorage.getItem("boardHomography")

if(stored){
homography=cv.matFromArray(3,3,cv.CV_64F,JSON.parse(stored))
log("Loaded saved calibration")
}

process()

}

video.addEventListener("click",function(e){

if(homography) return

let rect=video.getBoundingClientRect()

let x=(e.clientX-rect.left)/rect.width*video.videoWidth
let y=(e.clientY-rect.top)/rect.height*video.videoHeight

calibrationPoints.push([x,y])

log("Corner "+calibrationPoints.length+" captured")

if(calibrationPoints.length===4){

computeHomography()

}

})

function computeHomography(){

let src=cv.matFromArray(4,1,cv.CV_32FC2,[
calibrationPoints[0][0],calibrationPoints[0][1],
calibrationPoints[1][0],calibrationPoints[1][1],
calibrationPoints[2][0],calibrationPoints[2][1],
calibrationPoints[3][0],calibrationPoints[3][1]
])

let dst=cv.matFromArray(4,1,cv.CV_32FC2,[
0,0,
500,0,
500,500,
0,500
])

homography=cv.getPerspectiveTransform(src,dst)

localStorage.setItem("boardHomography",JSON.stringify(Array.from(homography.data64F)))

log("Calibration stored")

}

function process(){

try{

cap.read(frame)

if(!initialized && frame.cols>0){

log("Frame initialized "+frame.cols+" x "+frame.rows)
initialized=true

}

if(homography){

cv.warpPerspective(frame,warped,homography,new cv.Size(500,500))

cv.imshow("warpedCanvas",warped)

cv.cvtColor(warped,hsv,cv.COLOR_RGBA2HSV)

let lower=new cv.Mat(hsv.rows,hsv.cols,hsv.type(),[100,120,50,0])
let upper=new cv.Mat(hsv.rows,hsv.cols,hsv.type(),[140,255,255,255])

cv.inRange(hsv,lower,upper,mask)

cv.findContours(mask,contours,hierarchy,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE)

if(contours.size()>0){

let cnt=contours.get(0)
let rect=cv.boundingRect(cnt)

let cx=rect.x+rect.width/2
let cy=rect.y+rect.height/2

let ctx=document.getElementById("warpedCanvas").getContext("2d")

ctx.strokeStyle="cyan"
ctx.lineWidth=3
ctx.strokeRect(rect.x,rect.y,rect.width,rect.height)

let square=-1

if(cy>450) square=Math.floor((500-cx)/50)
else if(cx<50) square=10+Math.floor((500-cy)/50)
else if(cy<50) square=20+Math.floor(cx/50)
else if(cx>450) square=30+Math.floor(cy/50)

log("Pawn "+cx.toFixed(0)+","+cy.toFixed(0)+" square:"+square)

}

}

cv.imshow("canvasOutput",frame)

}catch(e){

log("Vision error "+e)

}

requestAnimationFrame(process)

}

</script>

</body>
</html>

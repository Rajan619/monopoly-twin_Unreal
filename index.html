<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Monopoly Digital Twin</title>

<script async src="https://docs.opencv.org/4.10.0/opencv.js"></script>

<style>
body{
    background:#111;
    color:white;
    font-family:monospace;
    text-align:center;
}
video, canvas{
    border:1px solid #444;
    margin:5px;
}
</style>

</head>

<body>

<h2>Monopoly Digital Twin</h2>

<video id="video" width="640" height="480" autoplay playsinline></video> <br>

<canvas id="canvasOutput" width="640" height="480"></canvas> <br>

<canvas id="warpedCanvas" width="500" height="500"></canvas>

<p id="status">Loading OpenCV...</p>

<script>

let video = document.getElementById("video");
let canvasOutput = document.getElementById("canvasOutput");
let ctx = canvasOutput.getContext("2d");

let warpedCanvas = document.getElementById("warpedCanvas");
let warpedCtx = warpedCanvas.getContext("2d");

let streaming = false;

navigator.mediaDevices.getUserMedia({
    video:{
        facingMode:"environment",
        width:1280,
        height:720
    },
    audio:false
}).then(function(stream){
    video.srcObject = stream;
    video.play();
});

video.addEventListener("canplay", function(){
    if(!streaming){
        streaming = true;
    }
}, false);

function startCV(){

let cap = new cv.VideoCapture(video);

let frame = new cv.Mat(video.height, video.width, cv.CV_8UC4);
let gray = new cv.Mat();

let warped = new cv.Mat(500,500,cv.CV_8UC4);

let hsv = new cv.Mat();
let mask = new cv.Mat();

let contours = new cv.MatVector();
let hierarchy = new cv.Mat();

let dictionary = new cv.aruco_Dictionary(cv.DICT_4X4_50);
let parameters = new cv.aruco_DetectorParameters();

let corners = new cv.MatVector();
let ids = new cv.Mat();

function process(){

cap.read(frame);

cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY);

cv.aruco.detectMarkers(gray, dictionary, corners, ids, parameters);

let boardCorners = {};

if(ids.rows >= 4){

for(let i=0;i<ids.rows;i++){

let id = ids.intAt(i,0);
let marker = corners.get(i);
let d = marker.data32F;

if(id===0) boardCorners.tl=[d[0],d[1]];
if(id===1) boardCorners.tr=[d[2],d[3]];
if(id===2) boardCorners.br=[d[4],d[5]];
if(id===3) boardCorners.bl=[d[6],d[7]];

}

if(boardCorners.tl && boardCorners.tr && boardCorners.br && boardCorners.bl){

let src = cv.matFromArray(4,1,cv.CV_32FC2,[
boardCorners.tl[0],boardCorners.tl[1],
boardCorners.tr[0],boardCorners.tr[1],
boardCorners.br[0],boardCorners.br[1],
boardCorners.bl[0],boardCorners.bl[1]
]);

let dst = cv.matFromArray(4,1,cv.CV_32FC2,[
0,0,
500,0,
500,500,
0,500
]);

let M = cv.getPerspectiveTransform(src,dst);

cv.warpPerspective(frame,warped,M,new cv.Size(500,500));

cv.imshow("warpedCanvas",warped);

cv.cvtColor(warped,hsv,cv.COLOR_RGBA2HSV);

let lower = new cv.Mat(hsv.rows,hsv.cols,hsv.type(),[100,120,50,0]);
let upper = new cv.Mat(hsv.rows,hsv.cols,hsv.type(),[140,255,255,255]);

cv.inRange(hsv,lower,upper,mask);

cv.findContours(mask,contours,hierarchy,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);

if(contours.size()>0){

let cnt = contours.get(0);
let rect = cv.boundingRect(cnt);

let cx = rect.x + rect.width/2;
let cy = rect.y + rect.height/2;

warpedCtx.strokeStyle="cyan";
warpedCtx.lineWidth=3;
warpedCtx.strokeRect(rect.x,rect.y,rect.width,rect.height);

let square=-1;

if(cy>450) square=Math.floor((500-cx)/50);
else if(cx<50) square=10+Math.floor((500-cy)/50);
else if(cy<50) square=20+Math.floor(cx/50);
else if(cx>450) square=30+Math.floor(cy/50);

document.getElementById("status").innerText=
"Pawn: "+cx.toFixed(0)+","+cy.toFixed(0)+" | Square: "+square;

}

src.delete();
dst.delete();
M.delete();

}

}

cv.imshow("canvasOutput",frame);

requestAnimationFrame(process);

}

process();

}

cv["onRuntimeInitialized"]=()=>{
document.getElementById("status").innerText="OpenCV ready";
startCV();
};

</script>

</body>
</html>

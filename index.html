
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Monopoly Digital Twin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js"></script>

<style>
body{
background:#111;
color:white;
font-family:monospace;
margin:0;
text-align:center;
}

#container{
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
}

video{
width:95vw;
max-width:480px;
border:2px solid #444;
border-radius:6px;
margin-bottom:10px;
}

canvas{
width:95vw;
max-width:480px;
border:2px solid #444;
border-radius:6px;
margin-bottom:10px;
}

button{
padding:12px 20px;
font-size:16px;
border-radius:6px;
border:none;
background:#2ecc71;
color:white;
margin:10px;
}

#logs{
width:95vw;
max-width:480px;
height:140px;
background:black;
color:#00ff9c;
overflow-y:auto;
font-size:12px;
padding:8px;
border:1px solid #333;
text-align:left;
}
</style>
</head>

<body>

<div id="container">

<h3>Monopoly Digital Twin</h3>

<button id="startBtn" disabled>Loading OpenCV...</button>

<video id="video" autoplay playsinline></video>

<canvas id="canvasOutput" width="640" height="480"></canvas>

<canvas id="warpedCanvas" width="500" height="500"></canvas>

<div id="logs"></div>

</div>

<script>

let video=document.getElementById("video");
let startBtn=document.getElementById("startBtn");
let logs=document.getElementById("logs");

function log(msg){
console.log(msg);
logs.innerHTML+=msg+"<br>";
logs.scrollTop=logs.scrollHeight;
}

let cap,frame,gray,warped,hsv,mask,contours,hierarchy;
let dictionary,parameters,corners,ids;

function onOpenCvReady(){
log("OpenCV loaded successfully");
startBtn.disabled=false;
startBtn.innerText="Start Camera";
}

if(typeof cv !== "undefined"){
if(cv.getBuildInformation){
onOpenCvReady();
}else{
cv['onRuntimeInitialized']=onOpenCvReady;
}
}else{
log("Waiting for OpenCV...");
}

startBtn.onclick=startCamera;

function startCamera(){

log("Starting camera...");

navigator.mediaDevices.getUserMedia({
video:{
facingMode:{ideal:"environment"},
width:{ideal:1280},
height:{ideal:720}
},
audio:false
})
.then(stream=>{

video.srcObject=stream;
video.play();

video.onloadedmetadata=()=>{

log("Camera metadata loaded");

startVision();

};

})
.catch(err=>log("Camera error: "+err));

}

function startVision(){

log("Initializing vision pipeline");

cap=new cv.VideoCapture(video);

frame=new cv.Mat(video.videoHeight,video.videoWidth,cv.CV_8UC4);
gray=new cv.Mat();

warped=new cv.Mat(500,500,cv.CV_8UC4);

hsv=new cv.Mat();
mask=new cv.Mat();

contours=new cv.MatVector();
hierarchy=new cv.Mat();

dictionary=new cv.aruco_Dictionary(cv.DICT_4X4_50);
parameters=new cv.aruco_DetectorParameters();

corners=new cv.MatVector();
ids=new cv.Mat();

process();

}

function process(){

try{

cap.read(frame);

cv.cvtColor(frame,gray,cv.COLOR_RGBA2GRAY);

cv.aruco.detectMarkers(gray,dictionary,corners,ids,parameters);

let boardCorners={};

if(ids.rows>=4){

for(let i=0;i<ids.rows;i++){

let id=ids.intAt(i,0);
let marker=corners.get(i);
let d=marker.data32F;

if(id===0) boardCorners.tl=[d[0],d[1]];
if(id===1) boardCorners.tr=[d[2],d[3]];
if(id===2) boardCorners.br=[d[4],d[5]];
if(id===3) boardCorners.bl=[d[6],d[7]];

}

if(boardCorners.tl && boardCorners.tr && boardCorners.br && boardCorners.bl){

let src=cv.matFromArray(4,1,cv.CV_32FC2,[
boardCorners.tl[0],boardCorners.tl[1],
boardCorners.tr[0],boardCorners.tr[1],
boardCorners.br[0],boardCorners.br[1],
boardCorners.bl[0],boardCorners.bl[1]
]);

let dst=cv.matFromArray(4,1,cv.CV_32FC2,[
0,0,
500,0,
500,500,
0,500
]);

let M=cv.getPerspectiveTransform(src,dst);

cv.warpPerspective(frame,warped,M,new cv.Size(500,500));

cv.imshow("warpedCanvas",warped);

cv.cvtColor(warped,hsv,cv.COLOR_RGBA2HSV);

let lower=new cv.Mat(hsv.rows,hsv.cols,hsv.type(),[100,120,50,0]);
let upper=new cv.Mat(hsv.rows,hsv.cols,hsv.type(),[140,255,255,255]);

cv.inRange(hsv,lower,upper,mask);

cv.findContours(mask,contours,hierarchy,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);

if(contours.size()>0){

let cnt=contours.get(0);
let rect=cv.boundingRect(cnt);

let cx=rect.x+rect.width/2;
let cy=rect.y+rect.height/2;

let ctx=document.getElementById("warpedCanvas").getContext("2d");

ctx.strokeStyle="cyan";
ctx.lineWidth=3;
ctx.strokeRect(rect.x,rect.y,rect.width,rect.height);

let square=-1;

if(cy>450) square=Math.floor((500-cx)/50);
else if(cx<50) square=10+Math.floor((500-cy)/50);
else if(cy<50) square=20+Math.floor(cx/50);
else if(cx>450) square=30+Math.floor(cy/50);

log("Pawn "+cx.toFixed(0)+","+cy.toFixed(0)+" square:"+square);

}

src.delete();
dst.delete();
M.delete();

}

}

cv.imshow("canvasOutput",frame);

}catch(e){

log("Vision error: "+e);

}

requestAnimationFrame(process);

}

</script>

</body>
</html>

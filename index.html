<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Digital Twin</title>
    <script src="https://docs.opencv.org/4.10.0/opencv.js" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .header { background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        #status { color: #4caf50; font-weight: bold; }
        video, canvas { width: 100%; max-width: 500px; border-radius: 8px; background: #000; display: block; margin: 5px auto; border: 2px solid #333; }
        .controls { margin: 15px; }
        button { background: #d32f2f; color: white; border: none; padding: 12px 24px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .label { color: #aaa; font-size: 12px; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div id="status">TAP 4 CORNERS ON FEED BELOW</div>
    </div>

    <div class="label">1. Bangalore Live Feed</div>
    <video id="videoInput" playsinline></video>

    <div class="controls">
        <button onclick="resetCorners()">Reset Calibration</button>
    </div>

    <div class="label">2. Digital Twin (Warped + Pawn)</div>
    <canvas id="canvasOutput"></canvas>

    <script type="text/javascript">
        let points = [];
        const video = document.getElementById('videoInput');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvasOutput');

        // Capture taps and map them to video pixels
        video.addEventListener('click', (e) => {
            if (points.length < 8) {
                const rect = video.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (video.videoWidth / rect.width);
                const y = (e.clientY - rect.top) * (video.videoHeight / rect.height);
                points.push(x, y);
                
                let remaining = 4 - (points.length / 2);
                if (remaining > 0) {
                    status.innerHTML = `TAP ${remaining} MORE CORNERS`;
                } else {
                    status.innerHTML = "BOARD SYNCED ✅";
                    status.style.color = "#4caf50";
                }
            }
        });

        function resetCorners() {
            points = [];
            status.innerHTML = "TAP 4 CORNERS ON FEED BELOW";
            status.style.color = "#ffeb3b";
        }

        function onOpenCvReady() {
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 } 
            })
            .then(stream => {
                video.srcObject = stream;
                video.play();
                // Wait for video metadata to load before starting CV
                video.onloadedmetadata = () => { startCV(); };
            })
            .catch(err => {
                status.innerHTML = "CAMERA ERROR: " + err.name;
                status.style.color = "#f44336";
            });
        }

        function startCV() {
            const cap = new cv.VideoCapture(video);
            const src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            const dst = new cv.Mat(500, 500, cv.CV_8UC4);
            const hsv = new cv.Mat();
            const mask = new cv.Mat();
            
            // HSV Range for Blue Pawn Detection
            let lowBlue = new cv.Mat(500, 500, cv.CV_8UC3, [100, 120, 50, 0]);
            let highBlue = new cv.Mat(500, 500, cv.CV_8UC3, [140, 255, 255, 255]);

            function process() {
                try {
                    cap.read(src);

                    if (points.length === 8) {
                        // 1. Perspective Warp
                        let srcCoords = cv.matFromArray(4, 1, cv.CV_32FC2, points);
                        let dstCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [0,0, 500,0, 500,500, 0,500]);
                        let M = cv.getPerspectiveTransform(srcCoords, dstCoords);
                        cv.warpPerspective(src, dst, M, new cv.Size(500, 500));

                        // 2. Pawn Detection
                        cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
                        cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);
                        cv.inRange(hsv, lowBlue, highBlue, mask);

                        let contours = new cv.MatVector();
                        let hierarchy = new cv.Mat();
                        cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                        for (let i = 0; i < contours.size(); ++i) {
                            let area = cv.contourArea(contours.get(i));
                            if (area > 300) { // Found blue pawn
                                let rect = cv.boundingRect(contours.get(i));
                                let p1 = new cv.Point(rect.x, rect.y);
                                let p2 = new cv.Point(rect.x + rect.width, rect.y + rect.height);
                                cv.rectangle(dst, p1, p2, [0, 255, 255, 255], 3);
                                cv.putText(dst, "REMOTE PLAYER", new cv.Point(rect.x, rect.y - 10), 
                                           cv.FONT_HERSHEY_SIMPLEX, 0.5, [0, 255, 255, 255], 2);
                            }
                        }

                        // 3. Grid Visualization
                        for(let i=1; i<10; i++) {
                            cv.line(dst, new cv.Point(i*50, 0), new cv.Point(i*50, 500), [0, 255, 0, 80], 1);
                            cv.line(dst, new cv.Point(0, i*50), new cv.Point(500, i*50), [0, 255, 0, 80], 1);
                        }

                        cv.imshow('canvasOutput', dst);

                        // Memory Management
                        M.delete(); srcCoords.delete(); dstCoords.delete();
                        contours.delete(); hierarchy.delete();
                    } else {
                        // Show raw feed in output window until calibrated
                        cv.imshow('canvasOutput', src);
                    }
                } catch (err) {
                    console.error("CV Error:", err);
                }
                requestAnimationFrame(process);
            }
            process();
        }

        var Module = { onRuntimeInitialized: onOpenCvReady };
    </script>
</body>
</html>
